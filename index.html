<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eldborg">
<meta name="theme-color" content="#111110">
<meta name="color-scheme" content="dark">
<title>Eldborg — 30-Day Fat Loss Protocol</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg-primary: #1c1c1a;
  --bg-secondary: #242422;
  --bg-tertiary: #111110;
  --text-primary: #f0ede6;
  --text-secondary: #a8a59e;
  --text-tertiary: #6e6d68;
  --border-light: rgba(255,255,255,.08);
  --border-mid: rgba(255,255,255,.16);
  --radius-md: 8px;
  --radius-lg: 12px;
  --success-bg: rgba(59,109,17,.22);
  --success-border: rgba(96,172,29,.4);
  --success-text: #97c459;
  --accent: #185FA5;
  --accent-light: #85B7EB;
  --green: #1D9E75;
  --green-light: #9FE1CB;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; color-scheme: dark; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg-tertiary);
  color: var(--text-primary);
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom, 16px);
}
#app { max-width: 680px; margin: 0 auto; padding: 16px 16px 40px; }

/* Header */
.header { background: linear-gradient(135deg, #042C53 0%, #0F6E56 50%, #185FA5 100%); padding: 1.25rem 1.5rem; border-radius: var(--radius-lg); margin-bottom: 1.25rem; }
.header-eyebrow { font-size: 10px; font-weight: 500; color: #5DCAA5; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 4px; }
.header-title { font-size: 28px; font-weight: 600; color: #E6F1FB; margin-bottom: 2px; }
.header-tagline { font-size: 13px; color: #85B7EB; margin-bottom: 14px; }
.header-stats { display: flex; gap: 8px; flex-wrap: wrap; }
.header-stat { background: rgba(255,255,255,.11); border: .5px solid rgba(255,255,255,.18); border-radius: var(--radius-md); padding: 7px 12px; text-align: center; flex: 1; min-width: 60px; }
.header-stat .val { font-size: 18px; font-weight: 600; color: #9FE1CB; line-height: 1.2; }
.header-stat .lbl { font-size: 10px; color: #85B7EB; text-transform: uppercase; letter-spacing: .05em; }

/* Icelandic word */
.icelandic-word { background: rgba(127,119,221,.12); border: .5px solid rgba(127,119,221,.3); border-radius: var(--radius-lg); padding: 10px 14px; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 12px; }
.word-icon { font-size: 20px; color: #AFA9EC; flex-shrink: 0; }
.word-title { font-size: 17px; font-weight: 600; color: #AFA9EC; }
.word-meaning { font-size: 12px; color: var(--text-secondary); margin-top: 2px; line-height: 1.4; }

/* Streak */
.streak-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
.streak-card { flex: 1; background: var(--bg-primary); border: .5px solid var(--border-light); border-radius: var(--radius-lg); padding: 12px 8px; text-align: center; }
.streak-val { font-size: 26px; font-weight: 600; line-height: 1.1; }
.sv-fire { color: #D85A30; } .sv-ice { color: #85B7EB; } .sv-aurora { color: #AFA9EC; }
.streak-lbl { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .05em; margin-top: 3px; }

/* Day nav */
.section-label { font-size: 10px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
.day-nav { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 1.25rem; scrollbar-width: none; }
.day-nav::-webkit-scrollbar { display: none; }
.day-pill { flex-shrink: 0; width: 42px; height: 52px; border-radius: var(--radius-md); border: .5px solid var(--border-light); background: var(--bg-secondary); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; gap: 1px; }
.day-pill .dp-num { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.day-pill .dp-mon { font-size: 9px; color: var(--text-tertiary); }
.day-pill .dp-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-tertiary); opacity: .35; margin-top: 1px; }
.day-pill.active { background: #0a1f38; border-color: #185FA5; }
.day-pill.active .dp-num, .day-pill.active .dp-mon { color: #85B7EB; }
.day-pill.active .dp-dot { background: #85B7EB; opacity: .6; }
.day-pill.complete { background: var(--success-bg); border-color: var(--success-border); }
.day-pill.complete .dp-num { color: var(--success-text); }
.day-pill.complete .dp-dot { background: var(--success-text); opacity: 1; }
.day-pill.weekend .dp-num { color: #D85A30; }
.day-pill.active.weekend .dp-num { color: #F0997B; }

/* Day header */
.day-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
.day-title { flex: 1; }
.day-title h2 { font-size: 18px; font-weight: 600; }
.day-title .day-date { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.weekend-badge { display: inline-block; font-size: 10px; background: rgba(216,90,48,.22); color: #F0997B; border-radius: 4px; padding: 1px 6px; margin-left: 6px; vertical-align: middle; font-weight: 500; }
.ring-wrap { position: relative; width: 60px; height: 60px; flex-shrink: 0; }
.ring-wrap svg { transform: rotate(-90deg); display: block; }
.ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }

/* Countdown */
.countdown-banner { background: linear-gradient(135deg, #042C53, #085041); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 1rem; display: flex; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
.countdown-num { font-size: 40px; font-weight: 600; color: #9FE1CB; line-height: 1; }
.countdown-label { font-size: 13px; color: #5DCAA5; margin-top: 2px; }
.countdown-sub { font-size: 11px; color: #85B7EB; margin-top: 3px; }
.trip-chips { flex: 1; min-width: 160px; }
.trip-chips-label { font-size: 10px; color: #5DCAA5; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; font-weight: 500; }
.trip-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; background: rgba(239,159,39,.18); color: #FAC775; border-radius: 99px; padding: 3px 9px; margin: 2px 2px 2px 0; }

/* Trainer */
.trainer-msg { background: rgba(24,95,165,.1); border: .5px solid rgba(133,183,235,.2); border-radius: var(--radius-lg); padding: 12px 14px; margin-bottom: 1rem; }
.trainer-label { font-size: 10px; font-weight: 600; color: #85B7EB; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
.trainer-body { font-size: 13px; color: var(--text-secondary); line-height: 1.65; }

/* Tabs */
.tabs { display: flex; gap: 4px; background: var(--bg-secondary); border-radius: var(--radius-md); padding: 4px; margin-bottom: 1.25rem; }
.tab { flex: 1; padding: 8px 4px; border-radius: 6px; font-size: 12px; font-weight: 500; text-align: center; cursor: pointer; color: var(--text-secondary); border: none; background: transparent; }
.tab.active { background: #2c2c2a; color: var(--text-primary); border: .5px solid rgba(255,255,255,.15); }

/* Time blocks */
.time-block { margin-bottom: 1rem; }
.tb-header { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius-md); margin-bottom: 4px; }
.tb-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; flex: 1; }
.tb-time { font-size: 10px; opacity: .7; }
.tb-count { font-size: 11px; opacity: .7; margin-left: 4px; }
.tb-morning .tb-header { background: rgba(239,159,39,.16); color: #FAC775; }
.tb-midday  .tb-header { background: rgba(24,95,165,.16); color: #85B7EB; }
.tb-evening .tb-header { background: rgba(83,74,183,.2); color: #AFA9EC; }
.block-card { background: var(--bg-primary); border: .5px solid var(--border-light); border-radius: var(--radius-lg); overflow: hidden; }

/* Habit items */
.habit-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-bottom: .5px solid var(--border-light); cursor: pointer; user-select: none; -webkit-user-select: none; }
.habit-item:last-child { border-bottom: none; }
.habit-item:active { background: var(--bg-secondary); }
.habit-item.skipped { opacity: .4; cursor: default; }
.habit-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border-mid); flex-shrink: 0; margin-top: 1px; position: relative; transition: all .15s; }
.habit-check.checked { background: #0F6E56; border-color: #0F6E56; }
.habit-check.checked::after { content: ''; position: absolute; width: 5px; height: 9px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg); top: 2px; left: 5px; }
.habit-check.skip-check { background: var(--bg-secondary); border-color: transparent; }
.habit-text { flex: 1; min-width: 0; }
.habit-name { font-size: 14px; color: var(--text-primary); line-height: 1.4; }
.habit-name.done { text-decoration: line-through; color: var(--text-secondary); }
.habit-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; line-height: 1.4; }
.habit-badge { font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 500; flex-shrink: 0; margin-top: 2px; white-space: nowrap; }
.b-glacier { background: rgba(29,158,117,.2); color: #9FE1CB; }
.b-fire    { background: rgba(216,90,48,.2);  color: #F0997B; }
.b-aurora  { background: rgba(127,119,221,.2);color: #AFA9EC; }
.b-gold    { background: rgba(186,117,23,.2); color: #FAC775; }
.bundle-tag { font-size: 9px; background: rgba(127,119,221,.22); color: #AFA9EC; border-radius: 4px; padding: 1px 4px; margin-left: 4px; vertical-align: middle; }

/* Sliders */
.slider-row { margin-top: 8px; }
.slider-wrap { display: flex; align-items: center; gap: 8px; }
.slider-track { flex: 1; -webkit-appearance: none; appearance: none; height: 6px; border-radius: 99px; outline: none; cursor: pointer; }
.slider-track::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #185FA5; cursor: pointer; border: 2px solid #1c1c1a; box-shadow: 0 1px 4px rgba(0,0,0,.4); }
.slider-track::-moz-range-thumb { width: 22px; height: 22px; border-radius: 50%; background: #185FA5; cursor: pointer; border: 2px solid #1c1c1a; }
.slider-val { font-size: 13px; font-weight: 600; color: #85B7EB; min-width: 54px; text-align: right; }
.slider-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-tertiary); margin-top: 3px; }

/* Number inputs */
.num-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
.num-row input { width: 86px; height: 30px; font-size: 13px; padding: 0 8px; border-radius: var(--radius-md); border: .5px solid var(--border-mid); background: var(--bg-secondary); color: var(--text-primary); outline: none; }
.num-row input:focus { border-color: #185FA5; }
.num-row .unit { font-size: 11px; color: var(--text-tertiary); }

/* Cards */
.card { background: var(--bg-primary); border: .5px solid var(--border-light); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
.card-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.card-title i { font-size: 17px; color: var(--text-secondary); }

/* Weight */
.weight-big { display: flex; align-items: baseline; gap: 6px; margin-bottom: 10px; }
.weight-num { font-size: 32px; font-weight: 600; color: #85B7EB; }
.weight-u { font-size: 15px; color: var(--text-secondary); }
.weight-goal-lbl { font-size: 12px; color: var(--text-secondary); margin-left: auto; }
.pbar-wrap { background: var(--bg-secondary); border-radius: 99px; height: 8px; overflow: hidden; margin-bottom: 6px; }
.pbar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #1D9E75, #185FA5); transition: width .4s ease; }
.pbar-labels { font-size: 11px; color: var(--text-secondary); display: flex; justify-content: space-between; }
.weight-input { width: 190px; height: 34px; font-size: 14px; padding: 0 10px; border-radius: var(--radius-md); border: .5px solid var(--border-mid); background: var(--bg-secondary); color: var(--text-primary); outline: none; }
.weight-input:focus { border-color: #185FA5; }

/* Input rows */
.input-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: .5px solid var(--border-light); }
.input-row:last-child { border-bottom: none; }
.input-row label { font-size: 13px; color: var(--text-secondary); min-width: 110px; flex-shrink: 0; }
.input-row input { flex: 1; height: 32px; font-size: 14px; padding: 0 8px; border-radius: var(--radius-md); border: .5px solid var(--border-mid); background: var(--bg-secondary); color: var(--text-primary); outline: none; }
.input-row input:focus { border-color: #185FA5; }
.unit-lbl { font-size: 12px; color: var(--text-tertiary); min-width: 36px; }

/* Charts */
.chart-wrap { position: relative; width: 100%; height: 180px; margin-top: 12px; }
.chart-legend { display: flex; gap: 14px; margin-top: 10px; font-size: 11px; color: var(--text-secondary); flex-wrap: wrap; }
.chart-legend span { display: flex; align-items: center; gap: 4px; }

/* Iceland card */
.iceland-card { background: var(--bg-primary); border: .5px solid var(--border-light); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1rem; }
.iceland-img { width: 100%; height: 200px; object-fit: cover; display: block; background: #0a1628; }
.iceland-placeholder { width: 100%; height: 200px; display: none; align-items: center; justify-content: center; background: linear-gradient(135deg, #042C53, #085041); }
.iceland-body { padding: 1rem 1.25rem; }
.iceland-type-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.ic-type { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .08em; padding: 2px 8px; border-radius: 99px; }
.ic-landmark   { background: rgba(24,95,165,.2);   color: #85B7EB; }
.ic-restaurant { background: rgba(29,158,117,.2);  color: #9FE1CB; }
.ic-fact       { background: rgba(127,119,221,.2); color: #AFA9EC; }
.ic-trip       { background: rgba(186,117,23,.2);  color: #FAC775; }
.iceland-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; line-height: 1.3; }
.iceland-desc  { font-size: 13px; color: var(--text-secondary); line-height: 1.65; }

/* Notes */
.notes-area { width: 100%; min-height: 90px; font-size: 13px; font-family: inherit; color: var(--text-primary); background: var(--bg-secondary); border: .5px solid var(--border-mid); border-radius: var(--radius-md); padding: 10px 12px; resize: vertical; outline: none; line-height: 1.6; }
.notes-area:focus { border-color: #185FA5; }
.notes-area::placeholder { color: var(--text-tertiary); }
.notes-saved { font-size: 11px; color: #1D9E75; margin-top: 5px; opacity: 0; transition: opacity .3s; }
.notes-saved.show { opacity: 1; }

/* Claude buttons */
.claude-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 13px 16px; border-radius: var(--radius-lg); border: .5px solid var(--border-light); background: var(--bg-primary); cursor: pointer; text-align: left; margin-bottom: 8px; text-decoration: none; }
.claude-btn:active { background: var(--bg-secondary); }
.cb-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; }
.cb-checkin .cb-icon { background: linear-gradient(135deg, #042C53, #185FA5); color: #9FE1CB; }
.cb-open    .cb-icon { background: linear-gradient(135deg, #0F6E56, #1D9E75); color: white; }
.cb-coach   .cb-icon { background: linear-gradient(135deg, #534AB7, #7F77DD); color: white; }
.cb-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.cb-sub   { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.cb-arrow { font-size: 16px; color: var(--text-tertiary); margin-left: auto; }

/* Coach panel */
.coach-panel { background: var(--bg-primary); border: .5px solid var(--border-light); border-radius: var(--radius-lg); overflow: hidden; margin-top: 4px; }
.coach-header { padding: 10px 14px; border-bottom: .5px solid var(--border-light); display: flex; align-items: center; gap: 8px; }
.coach-header-title { font-size: 13px; font-weight: 600; color: var(--text-primary); flex: 1; }
.coach-status { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; flex-shrink: 0; }
.coach-status.thinking { background: #FAC775; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1;}50%{opacity:.4;} }
.coach-messages { height: 280px; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
.coach-msg { max-width: 85%; padding: 9px 12px; border-radius: 12px; font-size: 13px; line-height: 1.55; }
.coach-msg.user { background: #185FA5; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
.coach-msg.ai { background: #2a2a28; color: var(--text-primary); align-self: flex-start; border-bottom-left-radius: 4px; }
.coach-msg.thinking { color: var(--text-tertiary); font-style: italic; }
.coach-input-row { display: flex; gap: 8px; padding: 10px; border-top: .5px solid var(--border-light); background: var(--bg-secondary); }
.coach-input { flex: 1; height: 38px; font-size: 13px; font-family: inherit; padding: 0 10px; border-radius: var(--radius-md); border: .5px solid var(--border-mid); background: var(--bg-primary); color: var(--text-primary); outline: none; }
.coach-input:focus { border-color: #185FA5; }
.coach-send { width: 38px; height: 38px; border-radius: var(--radius-md); background: #185FA5; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; flex-shrink: 0; }
.coach-send:active { background: #0C447C; }
.coach-send:disabled { background: var(--border-mid); cursor: default; }

/* Cheat day */
.cheat-day-bar { display: flex; align-items: center; justify-content: space-between; background: var(--bg-primary); border: .5px solid var(--border-light); border-radius: var(--radius-lg); padding: 14px 16px; margin-top: 1.5rem; }
.cheat-day-label { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.cheat-day-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.toggle-wrap { position: relative; width: 48px; height: 28px; flex-shrink: 0; }
.toggle-wrap input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-slider { position: absolute; inset: 0; background: #3a3a38; border-radius: 99px; cursor: pointer; transition: background .2s; }
.toggle-slider::before { content: ''; position: absolute; width: 22px; height: 22px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
.toggle-wrap input:checked + .toggle-slider { background: #1D9E75; }
.toggle-wrap input:checked + .toggle-slider::before { transform: translateX(20px); }

/* Misc */
.comp-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.comp-row span { font-size: 13px; color: var(--text-secondary); }
.we-label { font-size: 10px; background: rgba(216,90,48,.2); color: #F0997B; padding: 3px 10px; border-radius: 99px; }
.log-weight-link { font-size: 12px; color: #85B7EB; cursor: pointer; font-weight: 500; margin-left: auto; }
.toast { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom,0px)); left: 50%; transform: translateX(-50%) translateY(80px); background: #042C53; color: #9FE1CB; padding: 10px 20px; border-radius: var(--radius-lg); font-size: 13px; font-weight: 500; transition: transform .25s ease; z-index: 999; white-space: nowrap; border: .5px solid #185FA5; pointer-events: none; box-shadow: 0 4px 24px rgba(0,0,0,.5); }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-eyebrow"><i class="ti ti-mountain"></i> 30-Day Fat Loss Protocol · Iceland Countdown</div>
    <div class="header-title">Eldborg</div>
    <div class="header-tagline">Forged in fire. Shaped by pressure. — Trainer Claude</div>
    <div class="header-stats" id="headerStats"></div>
  </div>
  <div class="icelandic-word">
    <div class="word-icon"><i class="ti ti-snowflake"></i></div>
    <div><div class="word-title" id="icelandicWord"></div><div class="word-meaning" id="icelandicMeaning"></div></div>
  </div>
  <div class="streak-row">
    <div class="streak-card"><div class="streak-val sv-fire" id="streakVal">0</div><div class="streak-lbl"><i class="ti ti-flame"></i> streak</div></div>
    <div class="streak-card"><div class="streak-val sv-ice" id="completedDays">0</div><div class="streak-lbl"><i class="ti ti-check"></i> done</div></div>
    <div class="streak-card"><div class="streak-val sv-aurora" id="lbsLostVal">0.0</div><div class="streak-lbl"><i class="ti ti-trending-down"></i> lbs lost</div></div>
  </div>
  <div class="section-label">Select Day</div>
  <div class="day-nav" id="dayNav"></div>
  <div id="dayContent"></div>
</div>

var DB = {}, currentDay = 1, activeTab = 'habits', wChart = null, cChart = null, coachHistory = [];

function loadDB() { try { var s = localStorage.getItem('eldborg_v1'); if (s) DB = JSON.parse(s); } catch(e) {} }
function saveDB() { try { localStorage.setItem('eldborg_v1', JSON.stringify(DB)); } catch(e) {} }
function getDay(d) { if (!DB[d]) DB[d] = {habits:{}, nums:{}, weight:null, note:'', cheatDay:false}; return DB[d]; }
function getDayDate(d) { var dt = new Date(START_DATE); dt.setDate(START_DATE.getDate() + d - 1); return dt; }
function isWeekend(d) { var dow = getDayDate(d).getDay(); return dow === 0 || dow === 6; }
function getHabitsForDay(d) { return HABITS.filter(function(h) { return !(h.weekdayOnly && isWeekend(d)); }); }

function getDayComp(d) {
  var day = DB[d]; if (!day) return 0;
  if (day.cheatDay) return 100;
  var habits = getHabitsForDay(d);
  var n = 0; habits.forEach(function(h) { if (day.habits[h.id]) n++; });
  if (day.weight) n++;
  return Math.round((n / (habits.length + 1)) * 100);
}

function calcStreak() { var s = 0; for (var d = currentDay-1; d >= 1; d--) { if (getDayComp(d) >= 70) s++; else break; } return s; }
function getStartWeight() { for (var d = 1; d <= 30; d++) { if (DB[d] && DB[d].weight) return DB[d].weight; } return 0; }
function calcLbsLost() {
  var sw = getStartWeight(), lw = sw;
  for (var d = 30; d >= 1; d--) { if (DB[d] && DB[d].weight) { lw = DB[d].weight; break; } }
  return sw ? Math.max(0, parseFloat((sw - lw).toFixed(1))) : 0;
}
function daysUntilTrip() { var now = new Date(); now.setHours(0,0,0,0); return Math.max(0, Math.ceil((TRIP_DATE - now) / 86400000)); }

function updateTopBar() {
  var ll = calcLbsLost(), sw = getStartWeight();
  var pct = sw ? Math.min(100, Math.round((ll/15)*100)) : 0;
  var done = 0; for (var k in DB) { if (getDayComp(parseInt(k)) >= 70) done++; }
  document.getElementById('headerStats').innerHTML =
    '<div class="header-stat"><div class="val">'+pct+'%</div><div class="lbl">to goal</div></div>' +
    '<div class="header-stat"><div class="val">'+(ll>0?'-'+ll.toFixed(1):'--')+'</div><div class="lbl">lbs lost</div></div>' +
    '<div class="header-stat"><div class="val">'+daysUntilTrip()+'</div><div class="lbl">to Iceland</div></div>' +
    '<div class="header-stat"><div class="val">'+getDayComp(currentDay)+'%</div><div class="lbl">today</div></div>';
  document.getElementById('streakVal').textContent = calcStreak();
  document.getElementById('completedDays').textContent = done;
  document.getElementById('lbsLostVal').textContent = ll.toFixed(1);
}

function buildDayNav() {
  var nav = document.getElementById('dayNav'); nav.innerHTML = '';
  for (var d = 1; d <= 30; d++) {
    (function(day) {
      var dt = getDayDate(day), mon = dt.toLocaleString('default',{month:'short'}), dn = dt.getDate();
      var comp = getDayComp(day), we = isWeekend(day);
      var el = document.createElement('div');
      el.className = 'day-pill' + (day===currentDay?' active':'') + (comp>=70?' complete':'') + (we?' weekend':'');
      el.innerHTML = '<div class="dp-num">'+day+'</div><div class="dp-mon">'+mon+' '+dn+'</div><div class="dp-dot"></div>';
      el.onclick = function() { currentDay = day; activeTab = 'habits'; buildDayNav(); buildDayContent(); updateTopBar(); setTimeout(function(){el.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});},30); };
      nav.appendChild(el);
    })(d);
  }
}

// ── Build habit row using DOM elements (no inline handlers) ──────────────
function buildHabitRow(h, day, isWe) {
  var chk = !!day.habits[h.id];
  var skip = h.weekdayOnly && isWe;

  var row = document.createElement('div');
  row.className = 'habit-item' + (skip ? ' skipped' : '');
  row.id = 'hi-' + h.id;
  row.setAttribute('role', 'checkbox');
  row.setAttribute('aria-checked', chk);
  if (!skip) row.setAttribute('tabindex', '0');

  var checkEl = document.createElement('div');
  checkEl.className = 'habit-check' + (skip ? ' skip-check' : chk ? ' checked' : '');
  checkEl.id = 'hc-' + h.id;

  var textEl = document.createElement('div');
  textEl.className = 'habit-text';

  var nameEl = document.createElement('div');
  nameEl.className = 'habit-name' + (chk && !skip ? ' done' : '');
  nameEl.id = 'hn-' + h.id;
  nameEl.textContent = h.name;
  if (h.bundle) {
    var tag = document.createElement('span');
    tag.className = 'bundle-tag';
    tag.textContent = 'bundle';
    nameEl.appendChild(tag);
  }

  var subEl = document.createElement('div');
  subEl.className = 'habit-sub';
  subEl.textContent = skip ? 'Weekend — not needed today' : h.sub;

  textEl.appendChild(nameEl);
  textEl.appendChild(subEl);

  if (h.unit && !skip) {
    var nv = parseFloat(day.nums[h.id]) || 0;
    if (h.slider) {
      var pct = Math.min(100, Math.round((nv / h.sliderMax) * 100));
      var hit = nv >= h.sliderTarget;
      var fc = hit ? '#1D9E75' : '#85B7EB';
      var sliderRow = document.createElement('div');
      sliderRow.className = 'slider-row';
      var sliderWrap = document.createElement('div');
      sliderWrap.className = 'slider-wrap';
      var sliderInput = document.createElement('input');
      sliderInput.type = 'range';
      sliderInput.className = 'slider-track';
      sliderInput.id = 'sl-' + h.id;
      sliderInput.min = 0; sliderInput.max = h.sliderMax; sliderInput.step = h.sliderStep; sliderInput.value = nv;
      sliderInput.style.background = 'linear-gradient(to right,' + fc + ' ' + pct + '%,var(--bg-secondary) ' + pct + '%)';
      (function(hid, htarget, hmax, hunit) {
        sliderInput.addEventListener('input', function(e) { e.stopPropagation(); handleSlider(hid, parseFloat(e.target.value), htarget, hmax, hunit); });
      })(h.id, h.sliderTarget, h.sliderMax, h.unit);
      var sliderVal = document.createElement('span');
      sliderVal.className = 'slider-val';
      sliderVal.id = 'sv-' + h.id;
      sliderVal.style.color = fc;
      sliderVal.textContent = nv + ' ' + h.unit;
      sliderWrap.appendChild(sliderInput);
      sliderWrap.appendChild(sliderVal);
      var sliderLabels = document.createElement('div');
      sliderLabels.className = 'slider-labels';
      sliderLabels.innerHTML = '<span>0</span><span style="color:' + fc + ';font-weight:600;">Target: ' + h.sliderTarget + ' ' + h.unit + '</span><span>' + h.sliderMax + '</span>';
      sliderRow.appendChild(sliderWrap);
      sliderRow.appendChild(sliderLabels);
      sliderRow.addEventListener('click', function(e) { e.stopPropagation(); });
      textEl.appendChild(sliderRow);
    } else {
      var numRow = document.createElement('div');
      numRow.className = 'num-row';
      var numInput = document.createElement('input');
      numInput.type = 'number'; numInput.step = 'any'; numInput.placeholder = h.ph; numInput.value = nv || '';
      (function(hid) {
        numInput.addEventListener('change', function(e) { e.stopPropagation(); setNum(hid, e.target.value); });
      })(h.id);
      var unitSpan = document.createElement('span');
      unitSpan.className = 'unit'; unitSpan.textContent = h.unit;
      numRow.appendChild(numInput); numRow.appendChild(unitSpan);
      numRow.addEventListener('click', function(e) { e.stopPropagation(); });
      textEl.appendChild(numRow);
    }
  }

  var badge = document.createElement('span');
  badge.className = 'habit-badge ' + h.badge;
  badge.textContent = h.label;

  row.appendChild(checkEl);
  row.appendChild(textEl);
  row.appendChild(badge);

  if (!skip) {
    row.addEventListener('click', function() { toggleHabit(h.id); });
  }

  return row;
}

function switchTab(tab) {
  activeTab = tab;

    var el = document.getElementById('tab-' + t);

    if (el) el.style.display = t === tab ? '' : 'none';
    if (btn) btn.className = 'tab' + (t === tab ? ' active' : '');
  });
  if (tab === 'progress') setTimeout(renderCharts, 30);
}

function updateRingAndCounts() {
  var day = getDay(currentDay);
  var habits = getHabitsForDay(currentDay);
  var total = habits.length + 1;
  var checked = habits.filter(function(h){return day.habits[h.id];}).length + (day.weight?1:0);
  var comp = day.cheatDay ? 100 : Math.round((checked/total)*100);
  var circ = 2 * Math.PI * 25;
  var arc = document.getElementById('ringArc'), pct = document.getElementById('ringPct');
  if (arc) { arc.setAttribute('stroke-dashoffset', Math.round(circ*(1-comp/100))); arc.setAttribute('stroke', comp>=70?'#1D9E75':'#185FA5'); }
  if (pct) pct.textContent = comp + '%';
  var isWe = isWeekend(currentDay);
  ['morning','midday','evening'].forEach(function(block) {
    var bh = HABITS.filter(function(h){return h.block===block;});
    var bc = bh.filter(function(h){if(h.weekdayOnly&&isWe)return false;return!!day.habits[h.id];}).length;
    var bt = bh.filter(function(h){return!(h.weekdayOnly&&isWe);}).length;
    var el = document.getElementById('bc-' + block); if(el) el.textContent = bc+'/'+bt;
  });
  var cc = document.getElementById('compCount');
  if (cc) cc.textContent = checked + ' of ' + total + ' completed';
  updateTopBar();
}

function toggleHabit(id) {
  var day = getDay(currentDay);
  day.habits[id] = !day.habits[id]; saveDB();
  var chk = day.habits[id];
  var hc = document.getElementById('hc-'+id); if(hc) hc.className = 'habit-check'+(chk?' checked':'');

  updateRingAndCounts();

  showToast(ts[Math.floor(Math.random()*ts.length)]);
}

function handleSlider(id, val, target, max, unit) {
  var day = getDay(currentDay);
  day.nums[id] = val; saveDB();
  var wasChk = !!day.habits[id], nowChk = val >= target;
  if (wasChk !== nowChk) { day.habits[id] = nowChk; saveDB(); var hc = document.getElementById('hc-'+id); var hn = document.getElementById('hn-'+id); if(hc) hc.className='habit-check'+(nowChk?' checked':''); if(hn) hn.className='habit-name'+(nowChk?' done':''); }
  var fc = val >= target ? '#1D9E75' : '#85B7EB';
  var pct = Math.min(100, Math.round((val/max)*100));
  var sl = document.getElementById('sl-'+id); var sv = document.getElementById('sv-'+id);
  if (sl) sl.style.background = 'linear-gradient(to right,'+fc+' '+pct+'%,var(--bg-secondary) '+pct+'%)';
  if (sv) { sv.textContent = val+' '+unit; sv.style.color = fc; }
  var lbls = sl && sl.parentElement && sl.parentElement.nextElementSibling;
  if (lbls) { var spans = lbls.querySelectorAll('span'); if(spans[1]){spans[1].style.color=fc;} }
  updateRingAndCounts();
}

function setNum(id, val) { getDay(currentDay).nums[id] = parseFloat(val)||0; saveDB(); }

function setWeight(val) {
  var v = parseFloat(val) || null;
  getDay(currentDay).weight = v; saveDB(); updateTopBar();
  var wd = document.getElementById('weightDisplay'); if(wd) wd.textContent = v || '--';
}

function toggleCheatDay() {
  var day = getDay(currentDay);
  day.cheatDay = !day.cheatDay; saveDB();
  if (day.cheatDay) { getHabitsForDay(currentDay).forEach(function(h){day.habits[h.id]=true;}); saveDB(); showToast('Cheat day on — 100%! You still showed up.'); }
  else { showToast('Cheat day off — back to the protocol.'); }
  buildDayContent(); updateTopBar(); buildDayNav();
}

function saveNote(val) {
  getDay(currentDay).note = val; saveDB();
  var s = document.getElementById('notesSaved'); if(s){s.classList.add('show');setTimeout(function(){s.classList.remove('show');},1800);}
}

function toggleCoach() {
  var panel = document.getElementById('coachPanel'), ch = document.getElementById('coachChevron');
  if (!panel) return;
  var open = panel.style.display === 'none';
  panel.style.display = open ? '' : 'none';
  if (ch) ch.className = 'ti '+(open?'ti-chevron-up':'ti-chevron-down')+' cb-arrow';
  if (open) { var m = document.getElementById('coachMessages'); if(m) m.scrollTop = m.scrollHeight; }
}

function buildSys() {
  var day = getDay(currentDay), sw = getStartWeight();
  var habits = getHabitsForDay(currentDay);
  var chk = habits.filter(function(h){return day.habits[h.id];});
  var unchk = habits.filter(function(h){return !day.habits[h.id];});
  return 'You are Trainer Claude, an elite accountability coach inside the Eldborg 30-day Iceland fat loss protocol app. ' +
    'Today is Day '+currentDay+' of 30 ('+getDayDate(currentDay).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})+').' +
    (isWeekend(currentDay)?' It is a weekend — no meeting treadmill today.':'') +
    ' User is training for a trip to Iceland departing June 16 2026: ION Adventure Hotel, Katla glacier super jeep, Lava Show, Golden Circle, Blue Lagoon, Bergmal festival, food tour, black sand beaches.' +
    ' Stats: weight='+(day.weight?day.weight+' lbs':'not logged')+(sw?' | start='+sw+' lbs | goal='+(sw-15).toFixed(1)+' lbs | lost='+calcLbsLost().toFixed(1)+' lbs':'')+
    ' | done ('+chk.length+'/'+habits.length+'): '+(chk.map(function(h){return h.name;}).join(', ')||'none')+
    (unchk.length?' | needed: '+unchk.map(function(h){return h.name;}).join(', '):' ALL DONE!')+
    (day.note?' | note: '+day.note:'')+
    ' | word: '+WORDS[currentDay-1].w+'. Be direct, warm, motivating. Use Icelandic words occasionally. 2-4 sentences. Reference their data.';
}

function sendCoach() {
  var input = document.getElementById('coachInput'), send = document.getElementById('coachSend');
  var msgs = document.getElementById('coachMessages'), status = document.getElementById('coachStatus');
  if (!input || !msgs) return;
  var text = input.value.trim(); if (!text) return;
  var ud = document.createElement('div'); ud.className = 'coach-msg user'; ud.textContent = text; msgs.appendChild(ud);
  input.value = ''; input.disabled = true; send.disabled = true;
  var td = document.createElement('div'); td.className = 'coach-msg ai thinking'; td.id = 'thinkBubble'; td.textContent = 'Trainer Claude is thinking...'; msgs.appendChild(td);
  msgs.scrollTop = msgs.scrollHeight; if (status) status.className = 'coach-status thinking';
  coachHistory.push({role:'user', content:text});
  fetch('https://api.anthropic.com/v1/messages', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:1000, system:buildSys(), messages:coachHistory})})
  .then(function(r){return r.json();}).then(function(data){
    var tb = document.getElementById('thinkBubble'); if(tb) tb.remove();
    var reply = (data.content&&data.content[0]&&data.content[0].text)||'Something went wrong — try again.';
    coachHistory.push({role:'assistant',content:reply});
    var ad = document.createElement('div'); ad.className='coach-msg ai'; ad.textContent=reply; msgs.appendChild(ad);
    msgs.scrollTop=msgs.scrollHeight; if(status)status.className='coach-status';
  }).catch(function(){
    var tb=document.getElementById('thinkBubble');if(tb)tb.remove();
    var ed=document.createElement('div');ed.className='coach-msg ai';ed.textContent='Connection error. Use the Check In button above to chat via Claude directly.';msgs.appendChild(ed);
    if(status)status.className='coach-status';
  }).finally(function(){input.disabled=false;send.disabled=false;input.focus();});
}

function renderCharts() {
  if(wChart){wChart.destroy();wChart=null;} if(cChart){cChart.destroy();cChart=null;}
  var tc='rgba(255,255,255,0.45)', gc='rgba(255,255,255,0.07)';
  var wc = document.getElementById('wChart');
  if (wc) {
    var wts=[]; for(var i=0;i<30;i++) wts.push(DB[i+1]&&DB[i+1].weight?DB[i+1].weight:null);
    var sw=getStartWeight(),gl=sw-15,daily=15/30;
    var lbs=[]; for(var j=0;j<30;j++) lbs.push('D'+(j+1));
    var pd=sw?(function(){var a=[];for(var k=0;k<30;k++)a.push(sw-(daily*k));return a;})():new Array(30).fill(null);
    wChart=new Chart(wc,{type:'line',data:{labels:lbs,datasets:[
      {label:'Weight',data:wts,borderColor:'#185FA5',backgroundColor:'rgba(24,95,165,0.1)',pointRadius:wts.map(function(w){return w?3:0;}),pointBackgroundColor:'#85B7EB',borderWidth:2,fill:true,tension:0.3,spanGaps:false},
      {label:'Goal',data:new Array(30).fill(sw?gl:null),borderColor:'#1D9E75',borderDash:[6,3],pointRadius:0,borderWidth:1.5,fill:false},
      {label:'Pace',data:pd,borderColor:'rgba(216,90,48,0.4)',borderDash:[3,4],pointRadius:0,borderWidth:1,fill:false}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:10},maxTicksLimit:10},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10},callback:function(v){return v+'lbs';}},grid:{color:gc}}}}});
  }
  var cc=document.getElementById('cChart');
  if(cc){
    var cs=[]; for(var m=0;m<30;m++) cs.push(getDayComp(m+1));
    var cl=[]; for(var n=0;n<30;n++) cl.push('D'+(n+1));
    cChart=new Chart(cc,{type:'bar',data:{labels:cl,datasets:[{label:'%',data:cs,backgroundColor:cs.map(function(c){return c>=70?'rgba(29,158,117,0.75)':c>0?'rgba(24,95,165,0.6)':'rgba(255,255,255,0.06)';}),borderRadius:3,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:10},maxTicksLimit:10},grid:{display:false}},y:{min:0,max:100,ticks:{color:tc,font:{size:10},callback:function(v){return v+'%';}},grid:{color:gc}}}}});
  }
}

var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){t.classList.remove('show');}, 2200);
}

loadDB();
var today = new Date(); today.setHours(0,0,0,0);
var diff = Math.floor((today - START_DATE) / 86400000);
currentDay = Math.min(30, Math.max(1, diff + 1));
updateTopBar(); buildDayNav(); buildDayContent();
setTimeout(function(){var a=document.querySelector('.day-pill.active');if(a)a.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});},120);
</script>
</body>
</html>
