<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eldborg">
<meta name="theme-color" content="#042C53">
<title>Eldborg — 30-Day Fat Loss Protocol</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f4;
    --bg-tertiary: #eeece6;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --border-light: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.18);
    --radius-md: 8px;
    --radius-lg: 12px;
    --success-bg: #eaf3de;
    --success-border: #3b6d11;
    --success-text: #27500a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a;
      --bg-secondary: #242422;
      --bg-tertiary: #2c2c2a;
      --text-primary: #f0ede6;
      --text-secondary: #a8a59e;
      --text-tertiary: #6e6d68;
      --border-light: rgba(255,255,255,0.08);
      --border-mid: rgba(255,255,255,0.14);
      --success-bg: rgba(59,109,17,0.2);
      --success-border: rgba(96,172,29,0.4);
      --success-text: #97c459;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom, 16px);
  }
  #app {
    max-width: 680px;
    margin: 0 auto;
    padding: 16px 16px 40px;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #042C53 0%, #0F6E56 50%, #185FA5 100%);
    padding: 1.25rem 1.5rem;
    border-radius: var(--radius-lg);
    margin-bottom: 1.25rem;
  }
  .header-eyebrow { font-size: 10px; font-weight: 500; color: #5DCAA5; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; }
  .header-title { font-size: 28px; font-weight: 600; color: #E6F1FB; margin-bottom: 2px; letter-spacing: -0.01em; }
  .header-tagline { font-size: 13px; color: #85B7EB; margin-bottom: 14px; }
  .header-stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .header-stat { background: rgba(255,255,255,0.11); border: 0.5px solid rgba(255,255,255,0.18); border-radius: var(--radius-md); padding: 7px 12px; text-align: center; flex: 1; min-width: 60px; }
  .header-stat .val { font-size: 18px; font-weight: 600; color: #9FE1CB; line-height: 1.2; }
  .header-stat .lbl { font-size: 10px; color: #85B7EB; text-transform: uppercase; letter-spacing: 0.05em; }

  /* ── Icelandic word ── */
  .icelandic-word {
    background: var(--bg-primary);
    border: 0.5px solid rgba(127,119,221,0.3);
    border-radius: var(--radius-lg);
    padding: 10px 14px;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .word-icon { font-size: 20px; color: #7F77DD; flex-shrink: 0; }
  .word-title { font-size: 17px; font-weight: 600; color: #534AB7; }
  .word-meaning { font-size: 12px; color: var(--text-secondary); margin-top: 2px; line-height: 1.4; }
  @media (prefers-color-scheme: dark) {
    .word-title { color: #AFA9EC; }
  }

  /* ── Streak cards ── */
  .streak-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .streak-card { flex: 1; background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius-lg); padding: 12px 8px; text-align: center; }
  .streak-val { font-size: 26px; font-weight: 600; line-height: 1.1; }
  .sv-fire { color: #D85A30; } .sv-ice { color: #185FA5; } .sv-aurora { color: #534AB7; }
  .streak-lbl { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 3px; }

  /* ── Day nav ── */
  .section-label { font-size: 10px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .day-nav { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 1.25rem; scrollbar-width: none; -ms-overflow-style: none; }
  .day-nav::-webkit-scrollbar { display: none; }
  .day-pill { flex-shrink: 0; width: 42px; height: 52px; border-radius: var(--radius-md); border: 0.5px solid var(--border-light); background: var(--bg-secondary); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; gap: 1px; }
  .day-pill .dp-num { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .day-pill .dp-mon { font-size: 9px; color: var(--text-tertiary); }
  .day-pill .dp-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-tertiary); opacity: 0.35; margin-top: 1px; }
  .day-pill.active { background: #042C53; border-color: #185FA5; }
  .day-pill.active .dp-num, .day-pill.active .dp-mon { color: #85B7EB; }
  .day-pill.active .dp-dot { background: #85B7EB; opacity: 0.6; }
  .day-pill.complete { background: var(--success-bg); border-color: var(--success-border); }
  .day-pill.complete .dp-num { color: var(--success-text); }
  .day-pill.complete .dp-dot { background: var(--success-text); opacity: 1; }
  .day-pill.weekend .dp-num { color: #D85A30; }
  .day-pill.active.weekend .dp-num { color: #F0997B; }

  /* ── Day header ── */
  .day-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .day-title { flex: 1; }
  .day-title h2 { font-size: 18px; font-weight: 600; color: var(--text-primary); }
  .day-title .day-date { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .weekend-badge { display: inline-block; font-size: 10px; background: rgba(216,90,48,0.12); color: #993C1D; border-radius: 4px; padding: 1px 6px; margin-left: 6px; vertical-align: middle; font-weight: 500; }
  @media (prefers-color-scheme: dark) { .weekend-badge { background: rgba(216,90,48,0.22); color: #F0997B; } }
  .ring-wrap { position: relative; width: 60px; height: 60px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); display: block; }
  .ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--text-primary); }

  /* ── Countdown banner ── */
  .countdown-banner {
    background: linear-gradient(135deg, #042C53, #085041);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    margin-bottom: 1rem;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    flex-wrap: wrap;
  }
  .countdown-num { font-size: 40px; font-weight: 600; color: #9FE1CB; line-height: 1; }
  .countdown-label { font-size: 13px; color: #5DCAA5; margin-top: 2px; }
  .countdown-sub { font-size: 11px; color: #85B7EB; margin-top: 3px; }
  .trip-chips { flex: 1; min-width: 160px; }
  .trip-chips-label { font-size: 10px; color: #5DCAA5; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; font-weight: 500; }
  .trip-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; background: rgba(239,159,39,0.2); color: #FAC775; border-radius: 99px; padding: 3px 9px; margin: 2px 2px 2px 0; }

  /* ── Trainer message ── */
  .trainer-msg { background: rgba(24,95,165,0.07); border: 0.5px solid rgba(24,95,165,0.18); border-radius: var(--radius-lg); padding: 12px 14px; margin-bottom: 1rem; }
  .trainer-label { font-size: 10px; font-weight: 600; color: #185FA5; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
  .trainer-body { font-size: 13px; color: var(--text-secondary); line-height: 1.65; }
  @media (prefers-color-scheme: dark) { .trainer-msg { background: rgba(24,95,165,0.1); border-color: rgba(133,183,235,0.2); } }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 4px; background: var(--bg-secondary); border-radius: var(--radius-md); padding: 4px; margin-bottom: 1.25rem; }
  .tab { flex: 1; padding: 8px 4px; border-radius: 6px; font-size: 13px; font-weight: 500; text-align: center; cursor: pointer; color: var(--text-secondary); border: none; background: transparent; transition: all 0.15s; }
  .tab.active { background: var(--bg-primary); color: var(--text-primary); border: 0.5px solid var(--border-light); }

  /* ── Time blocks ── */
  .time-block { margin-bottom: 1rem; }
  .tb-header { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius-md); margin-bottom: 4px; }
  .tb-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; flex: 1; }
  .tb-time { font-size: 10px; opacity: 0.7; }
  .tb-count { font-size: 11px; opacity: 0.7; margin-left: 4px; }
  .tb-morning .tb-header { background: rgba(239,159,39,0.12); color: #633806; }
  .tb-midday  .tb-header { background: rgba(24,95,165,0.1);  color: #0C447C; }
  .tb-evening .tb-header { background: rgba(83,74,183,0.12); color: #3C3489; }
  @media (prefers-color-scheme: dark) {
    .tb-morning .tb-header { background: rgba(239,159,39,0.16); color: #FAC775; }
    .tb-midday  .tb-header { background: rgba(24,95,165,0.16);  color: #85B7EB; }
    .tb-evening .tb-header { background: rgba(83,74,183,0.2);   color: #AFA9EC; }
  }
  .block-card { background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius-lg); overflow: hidden; }

  /* ── Habit items ── */
  .habit-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-bottom: 0.5px solid var(--border-light); cursor: pointer; user-select: none; -webkit-user-select: none; transition: background 0.1s; }
  .habit-item:last-child { border-bottom: none; }
  .habit-item:active { background: var(--bg-secondary); }
  .habit-item.skipped { opacity: 0.4; cursor: default; }
  .habit-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border-mid); flex-shrink: 0; margin-top: 1px; position: relative; transition: all 0.15s; background: transparent; }
  .habit-check.checked { background: #0F6E56; border-color: #0F6E56; }
  .habit-check.checked::after { content: ''; position: absolute; width: 5px; height: 9px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg); top: 2px; left: 5px; }
  .habit-check.skip-check { background: var(--bg-secondary); border-color: transparent; }
  .habit-text { flex: 1; min-width: 0; }
  .habit-name { font-size: 14px; color: var(--text-primary); line-height: 1.4; }
  .habit-name.done { text-decoration: line-through; color: var(--text-secondary); }
  .habit-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; line-height: 1.4; }
  .habit-badge { font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 500; flex-shrink: 0; margin-top: 2px; white-space: nowrap; }
  .b-glacier { background: #E1F5EE; color: #085041; }
  .b-fire    { background: #FAECE7; color: #993C1D; }
  .b-aurora  { background: #EEEDFE; color: #3C3489; }
  .b-gold    { background: #FAEEDA; color: #633806; }
  @media (prefers-color-scheme: dark) {
    .b-glacier { background: rgba(29,158,117,0.2);  color: #9FE1CB; }
    .b-fire    { background: rgba(216,90,48,0.2);   color: #F0997B; }
    .b-aurora  { background: rgba(127,119,221,0.2); color: #AFA9EC; }
    .b-gold    { background: rgba(186,117,23,0.2);  color: #FAC775; }
  }
  .bundle-tag { font-size: 9px; background: rgba(127,119,221,0.13); color: #3C3489; border-radius: 4px; padding: 1px 4px; margin-left: 4px; vertical-align: middle; }
  @media (prefers-color-scheme: dark) { .bundle-tag { background: rgba(127,119,221,0.22); color: #AFA9EC; } }
  .num-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
  .num-row input { width: 86px; height: 30px; font-size: 13px; padding: 0 8px; border-radius: var(--radius-md); border: 0.5px solid var(--border-mid); background: var(--bg-secondary); color: var(--text-primary); outline: none; }
  .num-row input:focus { border-color: #185FA5; }
  .num-row .unit { font-size: 11px; color: var(--text-tertiary); }

  /* ── Cards ── */
  .card { background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .card-title i { font-size: 17px; color: var(--text-secondary); }

  /* ── Weight ── */
  .weight-big { display: flex; align-items: baseline; gap: 6px; margin-bottom: 10px; }
  .weight-num { font-size: 32px; font-weight: 600; color: #185FA5; }
  .weight-u { font-size: 15px; color: var(--text-secondary); }
  .weight-goal-lbl { font-size: 12px; color: var(--text-secondary); margin-left: auto; }
  @media (prefers-color-scheme: dark) { .weight-num { color: #85B7EB; } }
  .pbar-wrap { background: var(--bg-secondary); border-radius: 99px; height: 8px; overflow: hidden; margin-bottom: 6px; }
  .pbar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #1D9E75, #185FA5); transition: width 0.4s ease; }
  .pbar-labels { font-size: 11px; color: var(--text-secondary); display: flex; justify-content: space-between; }

  /* ── Input rows ── */
  .input-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--border-light); }
  .input-row:last-child { border-bottom: none; }
  .input-row label { font-size: 13px; color: var(--text-secondary); min-width: 110px; flex-shrink: 0; }
  .input-row input { flex: 1; height: 32px; font-size: 14px; padding: 0 8px; border-radius: var(--radius-md); border: 0.5px solid var(--border-mid); background: var(--bg-secondary); color: var(--text-primary); outline: none; }
  .input-row input:focus { border-color: #185FA5; }
  .unit-lbl { font-size: 12px; color: var(--text-tertiary); min-width: 36px; }

  /* ── Iceland card ── */
  .iceland-card { background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1rem; }
  .iceland-img { width: 100%; height: 200px; object-fit: cover; display: block; background: #042C53; }
  .iceland-placeholder { width: 100%; height: 200px; display: none; align-items: center; justify-content: center; background: linear-gradient(135deg, #042C53, #085041); }
  .iceland-body { padding: 1rem 1.25rem; }
  .iceland-type-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .ic-type { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; padding: 2px 8px; border-radius: 99px; }
  .ic-landmark   { background: #E6F1FB; color: #0C447C; }
  .ic-restaurant { background: #E1F5EE; color: #085041; }
  .ic-fact       { background: #EEEDFE; color: #3C3489; }
  .ic-trip       { background: #FAEEDA; color: #633806; }
  @media (prefers-color-scheme: dark) {
    .ic-landmark   { background: rgba(24,95,165,0.2);   color: #85B7EB; }
    .ic-restaurant { background: rgba(29,158,117,0.2);  color: #9FE1CB; }
    .ic-fact       { background: rgba(127,119,221,0.2); color: #AFA9EC; }
    .ic-trip       { background: rgba(186,117,23,0.2);  color: #FAC775; }
  }
  .iceland-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; line-height: 1.3; }
  .iceland-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.65; }

  /* ── Charts ── */
  .chart-wrap { position: relative; width: 100%; height: 180px; margin-top: 12px; }
  .chart-legend { display: flex; gap: 14px; margin-top: 10px; font-size: 11px; color: var(--text-secondary); flex-wrap: wrap; }
  .chart-legend span { display: flex; align-items: center; gap: 4px; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: calc(20px + env(safe-area-inset-bottom, 0px)); left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #042C53; color: #9FE1CB;
    padding: 10px 20px; border-radius: var(--radius-lg);
    font-size: 13px; font-weight: 500;
    transition: transform 0.25s ease; z-index: 999;
    white-space: nowrap; border: 0.5px solid #185FA5;
    pointer-events: none; box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Completion summary row ── */
  .comp-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .comp-row span { font-size: 13px; color: var(--text-secondary); }
  .we-label { font-size: 10px; background: rgba(216,90,48,0.1); color: #993C1D; padding: 3px 10px; border-radius: 99px; }
  @media (prefers-color-scheme: dark) { .we-label { background: rgba(216,90,48,0.2); color: #F0997B; } }

  /* ── Notes ── */
  .notes-area { width: 100%; min-height: 90px; font-size: 13px; font-family: inherit; color: var(--text-primary); background: var(--bg-secondary); border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); padding: 10px 12px; resize: vertical; outline: none; line-height: 1.6; }
  .notes-area:focus { border-color: #185FA5; }
  .notes-area::placeholder { color: var(--text-tertiary); }
  .notes-saved { font-size: 11px; color: #1D9E75; margin-top: 5px; opacity: 0; transition: opacity 0.3s; }
  .notes-saved.show { opacity: 1; }

  /* ── Trainer Claude tab ── */
  .claude-section { margin-bottom: 1rem; }
  .claude-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 13px 16px; border-radius: var(--radius-lg); border: 0.5px solid var(--border-light); background: var(--bg-primary); cursor: pointer; text-align: left; transition: background 0.1s; margin-bottom: 8px; }
  .claude-btn:active { background: var(--bg-secondary); }
  .claude-btn .cb-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; }
  .cb-checkin .cb-icon { background: linear-gradient(135deg,#042C53,#185FA5); color: #9FE1CB; }
  .cb-open    .cb-icon { background: linear-gradient(135deg,#0F6E56,#1D9E75); color: white; }
  .cb-coach   .cb-icon { background: linear-gradient(135deg,#534AB7,#7F77DD); color: white; }
  .claude-btn .cb-text { flex: 1; }
  .claude-btn .cb-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .claude-btn .cb-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .claude-btn .cb-arrow { font-size: 16px; color: var(--text-tertiary); }

  /* ── AI Coach panel ── */
  .coach-panel { background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius-lg); overflow: hidden; margin-top: 4px; }
  .coach-messages { height: 280px; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
  .coach-msg { max-width: 85%; padding: 9px 12px; border-radius: 12px; font-size: 13px; line-height: 1.55; }
  .coach-msg.user { background: #185FA5; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
  .coach-msg.ai { background: var(--bg-secondary); color: var(--text-primary); align-self: flex-start; border-bottom-left-radius: 4px; }
  .coach-msg.ai.thinking { color: var(--text-tertiary); font-style: italic; }
  .coach-input-row { display: flex; gap: 8px; padding: 10px; border-top: 0.5px solid var(--border-light); background: var(--bg-secondary); }
  .coach-input { flex: 1; height: 38px; font-size: 13px; font-family: inherit; padding: 0 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border-mid); background: var(--bg-primary); color: var(--text-primary); outline: none; }
  .coach-input:focus { border-color: #185FA5; }
  .coach-send { width: 38px; height: 38px; border-radius: var(--radius-md); background: #185FA5; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; flex-shrink: 0; transition: background 0.1s; }
  .coach-send:active { background: #0C447C; }
  .coach-send:disabled { background: var(--border-mid); cursor: default; }
  .coach-header { padding: 10px 14px; border-bottom: 0.5px solid var(--border-light); display: flex; align-items: center; gap: 8px; }
  .coach-header-title { font-size: 13px; font-weight: 600; color: var(--text-primary); flex: 1; }
  .coach-status { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; flex-shrink: 0; }

let DB={}, currentDay=1, activeTab='habits', wChart=null, cChart=null;

function loadDB(){try{const s=localStorage.getItem('eldborg_v1');if(s)DB=JSON.parse(s);}catch(e){}}
function saveDB(){try{localStorage.setItem('eldborg_v1',JSON.stringify(DB));}catch(e){}}
function getDay(d){if(!DB[d])DB[d]={habits:{},nums:{},weight:null};return DB[d];}
function getDayDate(d){const dt=new Date(START_DATE);dt.setDate(START_DATE.getDate()+d-1);return dt;}
function isWeekend(d){const dow=getDayDate(d).getDay();return dow===0||dow===6;}
function getHabitsForDay(d){return HABITS.filter(h=>!(h.weekdayOnly&&isWeekend(d)));}
function getDayComp(d){
  const day=DB[d];if(!day)return 0;
  const nw=getHabitsForDay(d).filter(h=>!h.isWeight);
  let n=0;nw.forEach(h=>{if(day.habits[h.id])n++;});if(day.weight)n++;
  return Math.round((n/(nw.length+1))*100);
}
function calcStreak(){let s=0;for(let d=currentDay-1;d>=1;d--){if(getDayComp(d)>=70)s++;else break;}return s;}
function getStartWeight(){for(let d=1;d<=30;d++){if(DB[d]&&DB[d].weight)return DB[d].weight;}return 0;}
function calcLbsLost(){
  const sw=getStartWeight();let lw=sw;
  for(let d=30;d>=1;d--){if(DB[d]&&DB[d].weight){lw=DB[d].weight;break;}}
  return sw?Math.max(0,parseFloat((sw-lw).toFixed(1))):0;
}
function daysUntilTrip(){const now=new Date();now.setHours(0,0,0,0);return Math.max(0,Math.ceil((TRIP_DATE-now)/86400000));}

function updateTopBar(){
  const ll=calcLbsLost(),sw=getStartWeight();
  const pct=sw?Math.min(100,Math.round((ll/15)*100)):0;
  const done=Object.keys(DB).filter(d=>getDayComp(parseInt(d))>=70).length;
  document.getElementById('headerStats').innerHTML=
    '<div class="header-stat"><div class="val">'+pct+'%</div><div class="lbl">to goal</div></div>'+
    '<div class="header-stat"><div class="val">'+(ll>0?'-'+ll.toFixed(1):'--')+'</div><div class="lbl">lbs lost</div></div>'+
    '<div class="header-stat"><div class="val">'+daysUntilTrip()+'</div><div class="lbl">to Iceland</div></div>'+
    '<div class="header-stat"><div class="val">'+getDayComp(currentDay)+'%</div><div class="lbl">today</div></div>';
  document.getElementById('streakVal').textContent=calcStreak();
  document.getElementById('completedDays').textContent=done;
  document.getElementById('lbsLostVal').textContent=ll.toFixed(1);
}

    const el=document.createElement('div');
    el.className='day-pill'+(d===currentDay?' active':'')+(comp>=70?' complete':'')+(we?' weekend':'');
    el.innerHTML='<div class="dp-num">'+d+'</div><div class="dp-mon">'+mon+' '+dn+'</div><div class="dp-dot"></div>';
    el.onclick=(function(day){return function(){currentDay=day;activeTab='habits';buildDayNav();buildDayContent();updateTopBar();setTimeout(function(){el.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});},30);};})(d);
    nav.appendChild(el);
  }
}

function habitRow(h,day,isWe){
  const isChecked=h.isWeight?!!day.weight:!!day.habits[h.id];
  const skipped=h.weekdayOnly&&isWe;
  const tags=h.bundle?'<span class="bundle-tag">bundle</span>':'';
  const checkCls='habit-check'+(skipped?' skip-check':isChecked?' checked':'');
  const numVal=h.isWeight?(day.weight||''):(day.nums[h.id]||'');
  const clickAttr=skipped?'':' onclick="toggleHabit(\''+h.id+'\','+!!h.isWeight+')"';
  const ariaAttr=skipped?'aria-disabled="true"':'role="checkbox" aria-checked="'+isChecked+'" tabindex="0"';
  return '<div class="habit-item'+(skipped?' skipped':'')+'" id="hi-'+h.id+'"'+clickAttr+' '+ariaAttr+'>'+
    '<div class="'+checkCls+'" id="hc-'+h.id+'"></div>'+
    '<div class="habit-text">'+
      '<div class="habit-name'+(isChecked&&!skipped?' done':'')+'" id="hn-'+h.id+'">'+h.name+tags+'</div>'+
      '<div class="habit-sub">'+(skipped?'Weekend — no meetings today':h.sub)+'</div>'+
      (h.unit&&!skipped?'<div class="num-row" onclick="event.stopPropagation()"><input type="number" step="any" placeholder="'+h.ph+'" value="'+numVal+'" onchange="'+(h.isWeight?'setWeight(this.value)':'setNum(\''+h.id+'\',this.value)')+'"><span class="unit">'+h.unit+'</span></div>':'')+
    '</div>'+
    '<span class="habit-badge '+h.badge+'">'+h.label+'</span>'+
  '</div>';
}

  const gc=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.06)';
  const wc=document.getElementById('wChart');
  if(wc){
    const weights=Array.from({length:30},function(_,i){return DB[i+1]&&DB[i+1].weight?DB[i+1].weight:null;});
    const sw=getStartWeight(),gl=sw-15,daily=15/30;
    wChart=new Chart(wc,{type:'line',data:{labels:Array.from({length:30},function(_,i){return 'D'+(i+1);}),datasets:[
      {label:'Weight',data:weights,borderColor:'#185FA5',backgroundColor:'rgba(24,95,165,0.07)',pointRadius:weights.map(function(w){return w?3:0;}),pointBackgroundColor:'#185FA5',borderWidth:2,fill:true,tension:0.3,spanGaps:false},
      {label:'Goal',data:Array(30).fill(sw?gl:null),borderColor:'#1D9E75',borderDash:[6,3],pointRadius:0,borderWidth:1.5,fill:false},
      {label:'Pace',data:sw?Array.from({length:30},function(_,i){return sw-(daily*i);}):Array(30).fill(null),borderColor:'rgba(216,90,48,0.4)',borderDash:[3,4],pointRadius:0,borderWidth:1,fill:false}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:10},maxTicksLimit:10},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10},callback:function(v){return v+'lbs';}},grid:{color:gc}}}}});
  }
  const cc=document.getElementById('cChart');
  if(cc){
    const comps=Array.from({length:30},function(_,i){return getDayComp(i+1);});
    cChart=new Chart(cc,{type:'bar',data:{labels:Array.from({length:30},function(_,i){return 'D'+(i+1);}),datasets:[{label:'%',data:comps,backgroundColor:comps.map(function(c){return c>=70?'rgba(29,158,117,0.75)':c>0?'rgba(24,95,165,0.6)':'rgba(128,128,128,0.12)';}),borderRadius:3,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:10},maxTicksLimit:10},grid:{display:false}},y:{min:0,max:100,ticks:{color:tc,font:{size:10},callback:function(v){return v+'%';}},grid:{color:gc}}}}});
  }
}

window.toggleHabit=function(id,isWeight){
  if(isWeight)return;
  var day=getDay(currentDay);
  day.habits[id]=!day.habits[id];saveDB();
  var isChecked=day.habits[id];
  var hc=document.getElementById('hc-'+id);
  var hn=document.getElementById('hn-'+id);
  if(hc){hc.className='habit-check'+(isChecked?' checked':'');}
  if(hn){hn.className='habit-name'+(isChecked?' done':'');}
  var hi=document.getElementById('hi-'+id);
  if(hi)hi.setAttribute('aria-checked',isChecked);

  var nw=getHabitsForDay(currentDay).filter(function(h){return!h.isWeight;});
  var checked=nw.filter(function(h){return day.habits[h.id];}).length+(day.weight?1:0);
  var total=nw.length+1,comp=Math.round((checked/total)*100);
  var circ=2*Math.PI*25;
  var arc=document.getElementById('ringArc'),pct=document.getElementById('ringPct');
  if(arc){arc.setAttribute('stroke-dashoffset',Math.round(circ*(1-comp/100)));arc.setAttribute('stroke',comp>=70?'#1D9E75':'#185FA5');}
  if(pct)pct.textContent=comp+'%';

  var isWe=isWeekend(currentDay);
  ['morning','midday','evening'].forEach(function(block){
    var bh=HABITS.filter(function(h){return h.block===block;});
    var bc=bh.filter(function(h){if(h.weekdayOnly&&isWe)return false;if(h.isWeight)return!!day.weight;return!!day.habits[h.id];}).length;
    var bt=bh.filter(function(h){return!(h.weekdayOnly&&isWe);}).length;
    var el=document.getElementById('bc-'+block);
    if(el)el.textContent=bc+'/'+bt;
  });

  var cr=document.querySelector('.comp-row span');
  if(cr)cr.textContent=checked+' of '+total+' completed';

  updateTopBar();
  var toasts=['Framt! Keep going.','Þrekmaður!','The glacier grows.','Seigla in action.','One more vote cast.','Iceland is getting closer.'];
  showToast(toasts[Math.floor(Math.random()*toasts.length)]);
};

window.switchTab=function(tab){

  var nw=getHabitsForDay(currentDay).filter(function(h){return!h.isWeight;});
  var checked=nw.filter(function(h){return day.habits[h.id];});
  var unchecked=nw.filter(function(h){return!day.habits[h.id];});
  var checkedNames=checked.map(function(h){return h.name;}).join(', ');
  var uncheckedNames=unchecked.map(function(h){return h.name;}).join(', ');
  return 'You are Trainer Claude, an elite accountability coach inside the Eldborg 30-day Iceland fat loss protocol app. '+
    'Today is Day '+currentDay+' of 30 ('+getDayDate(currentDay).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})+').'+
    (isWeekend(currentDay)?' It is a weekend — no meeting treadmill habit today.':'')+
    ' The user is training for a trip to Iceland departing ~June 16 2026.'+
    ' Current stats: weight='+(day.weight?day.weight+' lbs':'not logged today')+
    (sw?' | starting weight='+sw+' lbs | goal='+(sw-15).toFixed(1)+' lbs | lost='+calcLbsLost().toFixed(1)+' lbs':'')+
    ' | habits completed ('+checked.length+'/'+nw.length+'): '+checkedNames+
    (unchecked.length?' | still needed: '+uncheckedNames:' — ALL DONE!')+
    (day.note?' | today's note: "'+day.note+'"':'')+
    ' | Icelandic word of the day: '+WORDS[currentDay-1].w+' ('+WORDS[currentDay-1].m+').'+
    ' Be direct, warm, and motivating. Use Icelandic words occasionally. Keep responses concise (2-4 sentences). '+
    'Reference their actual data when relevant. Never break character.';
}

window.sendCoach=function(){
  var input=document.getElementById('coachInput');
  var send=document.getElementById('coachSend');
  var msgs=document.getElementById('coachMessages');
  var status=document.getElementById('coachStatus');
  if(!input||!msgs)return;
  var text=input.value.trim();
  if(!text)return;

  // Add user message
  var userDiv=document.createElement('div');
  userDiv.className='coach-msg user';
  userDiv.textContent=text;
  msgs.appendChild(userDiv);
  input.value='';
  input.disabled=true;
  send.disabled=true;

  // Thinking indicator
  var thinkDiv=document.createElement('div');
  thinkDiv.className='coach-msg ai thinking';
  thinkDiv.textContent='Trainer Claude is thinking...';
  thinkDiv.id='thinkBubble';
  msgs.appendChild(thinkDiv);
  msgs.scrollTop=msgs.scrollHeight;
  if(status)status.className='coach-status thinking';

  coachHistory.push({role:'user',content:text});

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      system:buildSystemPrompt(),
      messages:coachHistory
    })
  }).then(function(r){return r.json();}).then(function(data){
    var tb=document.getElementById('thinkBubble');
    if(tb)tb.remove();
    var reply=(data.content&&data.content[0]&&data.content[0].text)||'Something went wrong. Try again.';
    coachHistory.push({role:'assistant',content:reply});
    var aiDiv=document.createElement('div');
    aiDiv.className='coach-msg ai';
    aiDiv.textContent=reply;
    msgs.appendChild(aiDiv);
    msgs.scrollTop=msgs.scrollHeight;
    if(status)status.className='coach-status';
  }).catch(function(err){
    var tb=document.getElementById('thinkBubble');
    if(tb)tb.remove();
    var errDiv=document.createElement('div');
    errDiv.className='coach-msg ai';
    errDiv.textContent='Connection error. Make sure you are on Claude.ai or a domain with API access.';
    msgs.appendChild(errDiv);
    if(status)status.className='coach-status';
  }).finally(function(){
    input.disabled=false;
    send.disabled=false;
    input.focus();
  });
};
